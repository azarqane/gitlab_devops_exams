stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: $DOCKER_USER/exam_gitlab

build_job:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA

.deploy_template:
  stage: deploy
  image: alpine/helm:3.12.0
  script:
    - helm upgrade --install skyblue-app ./skyblue-chart 
      --namespace $NAMESPACE 
      --create-namespace 
      --set image.tag=$CI_COMMIT_SHA
      --set image.repository=$DOCKER_IMAGE

deploy_dev:
  extends: .deploy_template
  variables:
    NAMESPACE: dev
  environment: dev

deploy_qa:
  extends: .deploy_template
  variables:
    NAMESPACE: qa
  environment: qa

deploy_staging:
  extends: .deploy_template
  variables:
    NAMESPACE: staging
  environment: staging

deploy_prod:
  extends: .deploy_template
  variables:
    NAMESPACE: prod
  environment: prod
  when: manual
